<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajukan Izin - Inventory & HR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .container h2 { color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.15); margin-bottom: 20px; }
        .form-card { background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 720px; margin: 0 auto; }
        .ajukan-row { margin-bottom: 20px !important; display: block !important; }
        .ajukan-row label { display: block !important; font-size: 13px !important; font-weight: 600 !important; color: #334155 !important; margin-bottom: 8px !important; text-transform: none !important; letter-spacing: normal !important; }
        .ajukan-row input,
        .ajukan-row select,
        .ajukan-row textarea {
            width: 100% !important;
            padding: 11px 14px !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 8px !important;
            font-size: 14px !important;
            font-family: inherit !important;
            box-sizing: border-box !important;
            background: white !important;
            color: #1e293b !important;
            transition: border-color 0.2s !important;
        }
        .ajukan-row textarea { min-height: 110px !important; resize: vertical !important; }
        .ajukan-row input:focus,
        .ajukan-row select:focus,
        .ajukan-row textarea:focus { outline: none !important; border-color: #1A4D8C !important; box-shadow: 0 0 0 3px rgba(26, 77, 140, 0.1) !important; }
        .ajukan-row input[type="file"] { padding: 8px !important; }
        .ajukan-grid-2 { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 16px !important; margin-bottom: 0 !important; }
        @media (max-width: 600px) { .ajukan-grid-2 { grid-template-columns: 1fr !important; } }
        .info-box { background: #eff6ff; border-left: 4px solid #1A4D8C; padding: 12px 16px; border-radius: 6px; font-size: 13px; color: #1e40af; margin-bottom: 18px; }
        .info-box.warning { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
        .btn-submit { background: #1A4D8C; color: #fff; padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-submit:hover { background: #2B6EB0; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .helper { font-size: 12px; color: #64748b; margin-top: 4px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>PT Wiratama Globalindo Jaya</h1>
        <div class="navbar-menu">
            <a href="dashboard-karyawan.html" data-page="dashboard-karyawan">Dashboard</a>
            <a href="ajukan-izin.html" data-page="ajukan-izin">Ajukan Izin</a>
            <a href="pengajuan-saya.html" data-page="pengajuan-saya">Pengajuan Saya</a>
            <a href="profil-saya.html" data-page="profil-saya">Profil Saya</a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>
    <script>
        (function() {
            const path = window.location.pathname.split('/').pop().replace('.html', '');
            document.querySelectorAll('.navbar-menu a[data-page]').forEach(a => {
                if (a.dataset.page === path) a.classList.add('active');
            });
        })();
    </script>

    <div class="container">
        <h2><i class="fas fa-paper-plane"></i> Ajukan Izin / Cuti</h2>

        <div class="form-card">
            <div class="info-box" id="saldoInfo">
                <i class="fas fa-info-circle"></i> Memuat informasi saldo cuti...
            </div>

            <form id="formIzin" enctype="multipart/form-data">
                <div class="ajukan-row">
                    <label>Jenis Pengajuan <span style="color:red">*</span></label>
                    <select name="jenis_izin" id="jenisIzin" required>
                        <option value="">-- Pilih Jenis --</option>
                        <option value="cuti_tahunan">Cuti Tahunan</option>
                        <option value="sakit">Sakit (perlu surat dokter)</option>
                        <option value="izin_pribadi">Izin Pribadi</option>
                        <option value="cuti_melahirkan">Cuti Melahirkan</option>
                        <option value="cuti_menikah">Cuti Menikah</option>
                        <option value="wfh">WFH / Kerja Remote</option>
                        <option value="dinas_luar">Dinas Luar / Kunjungan Klien</option>
                    </select>
                </div>

                <div class="ajukan-grid-2">
                    <div class="ajukan-row">
                        <label>Tanggal Mulai <span style="color:red">*</span></label>
                        <input type="date" name="tanggal_mulai" id="tglMulai" required>
                    </div>
                    <div class="ajukan-row">
                        <label>Tanggal Selesai <span style="color:red">*</span></label>
                        <input type="date" name="tanggal_selesai" id="tglSelesai" required>
                    </div>
                </div>

                <div class="ajukan-row">
                    <label>Jumlah Hari</label>
                    <input type="text" id="jumlahHari" readonly style="background:#f8fafc;">
                    <div class="helper">Otomatis dihitung dari tanggal mulai & selesai</div>
                </div>

                <div class="ajukan-row">
                    <label>Alasan / Keterangan <span style="color:red">*</span></label>
                    <textarea name="alasan" required placeholder="Jelaskan alasan pengajuan..."></textarea>
                </div>

                <div class="ajukan-row" id="lampiranRow" style="display:none;">
                    <label>Lampiran (Surat Dokter, dll)</label>
                    <input type="file" name="lampiran" accept="image/*,application/pdf">
                    <div class="helper">Format: JPG/PNG/PDF, max 5MB</div>
                </div>

                <div id="errorMsg" style="color:#dc2626;font-size:13px;margin-bottom:14px;display:none;"></div>

                <button type="submit" class="btn-submit" id="btnSubmit">
                    <i class="fas fa-paper-plane"></i> Kirim Pengajuan
                </button>
            </form>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="script.js"></script>
    <script>
        if (!localStorage.getItem('auth_token')) window.location.href = 'index.html';

        // Halaman ini khusus karyawan. Admin/HR tetap bisa akses untuk preview,
        // tapi data yang ditampilkan akan terbatas (mereka tidak punya karyawan_id).
        const _user = (() => { try { return JSON.parse(localStorage.getItem('auth_user')); } catch(e) { return null; } })();
        if (_user && !_user.karyawan_id) {
            // Tampilkan pesan ramah, redirect ke dashboard HR
            if (confirm('Halaman ini khusus untuk karyawan dengan profil terdaftar. Akun Anda (' + _user.role + ') tidak memiliki data karyawan. Kembali ke Dashboard?')) {
                window.location.href = ['admin','hr'].includes(_user.role) ? 'dashboard.html' : 'index.html';
            }
        }

        let saldoSisa = 0;

        async function loadSaldo() {
            try {
                const res = await apiFetch(`${API_URL}/me/saldo-cuti`);
                const j = await res.json();
                if (j.success) {
                    saldoSisa = j.data.sisa;
                    document.getElementById('saldoInfo').innerHTML =
                        `<i class="fas fa-info-circle"></i> Saldo cuti tahunan kamu: <strong>${j.data.sisa} hari</strong> (terpakai ${j.data.terpakai} dari ${j.data.jatah} hari).`;
                }
            } catch(e) {}
        }

        // Auto-hitung jumlah hari
        function hitungHari() {
            const m = document.getElementById('tglMulai').value;
            const s = document.getElementById('tglSelesai').value;
            if (!m || !s) return;
            const diff = Math.ceil((new Date(s) - new Date(m)) / (86400000)) + 1;
            document.getElementById('jumlahHari').value = diff > 0 ? `${diff} hari` : 'Tanggal tidak valid';
        }
        document.getElementById('tglMulai').addEventListener('change', hitungHari);
        document.getElementById('tglSelesai').addEventListener('change', hitungHari);

        // Show/hide lampiran berdasarkan jenis
        document.getElementById('jenisIzin').addEventListener('change', (e) => {
            const lampiranRow = document.getElementById('lampiranRow');
            if (e.target.value === 'sakit') {
                lampiranRow.style.display = 'block';
                lampiranRow.querySelector('label').innerHTML = 'Surat Dokter <span style="color:red">*</span>';
            } else if (['cuti_melahirkan', 'cuti_menikah'].includes(e.target.value)) {
                lampiranRow.style.display = 'block';
                lampiranRow.querySelector('label').innerHTML = 'Lampiran (Opsional)';
            } else {
                lampiranRow.style.display = 'none';
            }
        });

        document.getElementById('formIzin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'none';

            const form = e.target;
            const jenis = form.jenis_izin.value;
            const tglMulai = form.tanggal_mulai.value;
            const tglSelesai = form.tanggal_selesai.value;

            if (new Date(tglSelesai) < new Date(tglMulai)) {
                errorDiv.textContent = 'Tanggal selesai tidak boleh sebelum tanggal mulai.';
                errorDiv.style.display = 'block';
                return;
            }

            const diff = Math.ceil((new Date(tglSelesai) - new Date(tglMulai)) / 86400000) + 1;
            if (jenis === 'cuti_tahunan' && diff > saldoSisa) {
                errorDiv.textContent = `Saldo cuti tidak cukup. Sisa: ${saldoSisa} hari, diajukan: ${diff} hari.`;
                errorDiv.style.display = 'block';
                return;
            }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengirim...';

            try {
                const formData = new FormData(form);
                const res = await apiFetch(`${API_URL}/pengajuan-izin`, {
                    method: 'POST',
                    body: formData
                });
                const j = await res.json();

                if (j.success) {
                    alert('✅ ' + j.message);
                    window.location.href = 'pengajuan-saya.html';
                } else {
                    errorDiv.textContent = j.message || 'Gagal mengirim pengajuan.';
                    errorDiv.style.display = 'block';
                }
            } catch(e) {
                errorDiv.textContent = 'Terjadi kesalahan. Coba lagi.';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Kirim Pengajuan';
            }
        });

        loadSaldo();
    </script>
</body>
</html>
