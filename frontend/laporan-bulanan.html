<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Bulanan - Inventory Karyawan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        .container h2 { color: white; font-size: 28px; font-weight: 700; margin-bottom: 8px; }

        /* ── KONTROL PERIODE ── */
        .periode-bar {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 16px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .periode-bar label {
            color: rgba(255,255,255,0.85);
            font-size: 13px;
            font-weight: 600;
        }
        .periode-bar input[type="month"] {
            padding: 10px 16px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all .2s;
        }
        .periode-bar input[type="month"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .periode-bar input[type="month"]:focus { border-color: white; background: rgba(255,255,255,0.22); }
        .btn-load {
            padding: 10px 22px;
            background: white;
            color: var(--biru-tua);
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex; align-items: center; gap: 7px;
        }
        .btn-load:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .btn-export-pdf {
            padding: 10px 22px;
            background: linear-gradient(135deg,#dc2626,#b91c1c);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            display: none;
            align-items: center;
            gap: 7px;
        }
        .btn-export-pdf:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(220,38,38,0.4); }
        .btn-export-pdf.show { display: inline-flex; }
        .nav-bulan {
            margin-left: auto;
            display: flex; gap: 6px;
        }
        .nav-bulan button {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 8px 14px; border-radius: 10px;
            cursor: pointer; font-size: 13px; transition: all .2s;
        }
        .nav-bulan button:hover { background: rgba(255,255,255,0.25); }

        /* ── RINGKASAN CARDS ── */
        .ringkasan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .rcard {
            background: rgba(255,255,255,0.98);
            border-radius: 18px;
            padding: 18px 20px;
            box-shadow: 0 12px 30px rgba(26,77,140,0.13);
            border: 1px solid rgba(43,110,176,0.1);
            position: relative; overflow: hidden;
            transition: all .3s;
        }
        .rcard::before {
            content: '';
            position: absolute; top:0;left:0;right:0; height:4px;
        }
        .rcard:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(26,77,140,0.18); }
        .rcard.biru::before  { background: linear-gradient(90deg,#1A4D8C,#2B6EB0); }
        .rcard.hijau::before { background: linear-gradient(90deg,#16a34a,#22c55e); }
        .rcard.merah::before { background: linear-gradient(90deg,#dc2626,#f87171); }
        .rcard.kuning::before{ background: linear-gradient(90deg,#d97706,#fbbf24); }
        .rcard .rc-label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
        .rcard .rc-num {
            font-size: 34px; font-weight: 800; line-height: 1.1;
            background: linear-gradient(135deg,var(--biru-tua),var(--biru-muda));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .rcard.merah .rc-num  { background: linear-gradient(135deg,#dc2626,#f87171); -webkit-background-clip: text; background-clip: text; }
        .rcard.hijau .rc-num  { background: linear-gradient(135deg,#16a34a,#22c55e); -webkit-background-clip: text; background-clip: text; }
        .rcard.kuning .rc-num { background: linear-gradient(135deg,#d97706,#fbbf24); -webkit-background-clip: text; background-clip: text; }
        .rcard .rc-sub { font-size: 11px; color: #9ca3af; margin-top: 2px; }

        /* ── SECTION LAPORAN ── */
        .section-laporan {
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            padding: 24px 26px;
            margin-bottom: 22px;
            box-shadow: 0 12px 30px rgba(26,77,140,0.12);
            border: 1px solid rgba(43,110,176,0.1);
        }
        .section-laporan .sec-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(26,77,140,0.08);
        }
        .section-laporan .sec-header h3 {
            color: var(--biru-tua);
            font-size: 15px; font-weight: 700;
            display: flex; align-items: center; gap: 8px;
        }
        .sec-count {
            background: var(--biru-tua); color: white;
            border-radius: 20px; padding: 2px 12px;
            font-size: 12px; font-weight: 700;
        }
        .sec-count.merah  { background: #dc2626; }
        .sec-count.hijau  { background: #16a34a; }
        .sec-count.kuning { background: #d97706; }

        /* Laporan table */
        .lap-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; font-size: 12.5px; }
        .lap-table thead th {
            background: linear-gradient(135deg,rgba(26,77,140,.07),rgba(43,110,176,.07));
            padding: 9px 12px; text-align: left;
            font-weight: 700; color: var(--biru-tua);
            font-size: 11px; text-transform: uppercase; letter-spacing: .4px;
        }
        .lap-table thead th:first-child { border-radius: 8px 0 0 8px; }
        .lap-table thead th:last-child  { border-radius: 0 8px 8px 0; }
        .lap-table td {
            padding: 9px 12px; background: white;
            border-bottom: 1px solid #e0e7ff; color: #374151;
        }
        .lap-table tr:last-child td { border-bottom: none; }
        .lap-table tr:hover td { background: rgba(26,77,140,.03); }

        /* badges */
        .bdg {
            display: inline-block; padding: 2px 9px;
            border-radius: 20px; font-size: 11px; font-weight: 700;
        }
        .bdg-biru   { background:#dbeafe; color:#1e40af; }
        .bdg-hijau  { background:#dcfce7; color:#166534; }
        .bdg-kuning { background:#fef3c7; color:#92400e; }
        .bdg-merah  { background:#fee2e2; color:#991b1b; }
        .bdg-abu    { background:#f3f4f6; color:#374151; }

        /* Empty state */
        .empty-lap {
            text-align: center; padding: 30px; color: #9ca3af;
            font-style: italic; font-size: 13px;
        }
        .empty-lap i { font-size: 28px; display: block; margin-bottom: 8px; opacity: .4; }

        /* Loading */
        .loading-lap {
            text-align: center; padding: 60px; color: var(--biru-muda);
        }
        .spinner {
            display: inline-block; width: 36px; height: 36px;
            border: 3px solid rgba(26,77,140,.15);
            border-top-color: var(--biru-tua);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #mainContent { display: none; }

        /* Catatan section */
        .catatan-box {
            background: #fefce8; border: 1px solid #fde68a;
            border-radius: 12px; padding: 16px 18px; margin-top: 18px;
        }
        .catatan-box label { font-size: 12px; font-weight: 700; color: #92400e; display: block; margin-bottom: 8px; }
        .catatan-box textarea {
            width: 100%; border: 1px solid #fcd34d; border-radius: 8px;
            padding: 10px 12px; font-size: 13px; resize: vertical; min-height: 70px;
            font-family: 'Segoe UI', sans-serif;
        }
        .catatan-box textarea:focus { outline: none; border-color: #f59e0b; }
    </style>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A4D8C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PT Wiratama">
    <link rel="apple-touch-icon" href="img/pwa/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/pwa/icon-192.png">
</head>
<body>
    
    

    <div class="container">
        <h2><i class="fas fa-file-alt" style="margin-right:8px;"></i>Laporan Bulanan Inventaris</h2>

        <!-- KONTROL PERIODE -->
        <div class="periode-bar">
            <label><i class="fas fa-calendar-alt"></i> Periode:</label>
            <input type="month" id="inputBulan">
            <button class="btn-load" onclick="loadLaporan()">
                <i class="fas fa-search"></i> Tampilkan
            </button>
            <button class="btn-export-pdf" id="btnPDF" onclick="exportPDF()">
                <i class="fas fa-file-pdf"></i> Export PDF
            </button>
            <div class="nav-bulan">
                <button onclick="geserBulan(-1)"><i class="fas fa-chevron-left"></i> Bulan Lalu</button>
                <button onclick="geserBulan(1)">Bulan Depan <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <!-- LOADING -->
        <div id="loadingState" style="display:none;">
            <div class="loading-lap">
                <div class="spinner"></div>
                <p style="margin-top:14px;color:white;opacity:.7;">Memuat laporan...</p>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div id="mainContent">

            <!-- RINGKASAN CARDS -->
            <div class="ringkasan-grid" id="ringkasanGrid"></div>

            <!-- SECTION: ASET BARU MASUK -->
            <div class="section-laporan">
                <div class="sec-header">
                    <h3><i class="fas fa-plus-circle" style="color:#16a34a;"></i> Aset Baru Masuk Bulan Ini</h3>
                    <span class="sec-count hijau" id="cntAsetBaru">0</span>
                </div>
                <div id="secAsetBaru"></div>
            </div>

            <!-- SECTION: ASET BERMASALAH -->
            <div class="section-laporan">
                <div class="sec-header">
                    <h3><i class="fas fa-exclamation-triangle" style="color:#dc2626;"></i> Aset Bermasalah (Rusak/Servis/Hilang)</h3>
                    <span class="sec-count merah" id="cntMasalah">0</span>
                </div>
                <div id="secMasalah"></div>
            </div>

            <!-- SECTION: PERGANTIAN PENGGUNA LAPTOP -->
            <div class="section-laporan">
                <div class="sec-header">
                    <h3><i class="fas fa-exchange-alt" style="color:#d97706;"></i> Pergantian / Penugasan Laptop Bulan Ini</h3>
                    <span class="sec-count kuning" id="cntAssign">0</span>
                </div>
                <div id="secAssign"></div>
            </div>

            <!-- SECTION: KARYAWAN BARU -->
            <div class="section-laporan">
                <div class="sec-header">
                    <h3><i class="fas fa-user-plus" style="color:#1A4D8C;"></i> Karyawan Baru Bulan Ini</h3>
                    <span class="sec-count" id="cntKaryawan">0</span>
                </div>
                <div id="secKaryawan"></div>
            </div>

            <!-- CATATAN LAPORAN -->
            <div class="section-laporan">
                <div class="sec-header">
                    <h3><i class="fas fa-sticky-note" style="color:#d97706;"></i> Catatan Laporan</h3>
                </div>
                <div class="catatan-box">
                    <label>Catatan tambahan untuk laporan ini (opsional, akan muncul di PDF):</label>
                    <textarea id="catatanLaporan" placeholder="Masukkan catatan, kendala, atau informasi tambahan bulan ini..."></textarea>
                </div>
            </div>

        </div><!-- /mainContent -->
    </div>

    <script src="database.js"></script>
    <script src="script.js"></script>
    <script src="layout.js"></script>
    <script src="pwa-register.js"></script>
    <script>
        if (!localStorage.getItem('auth_token')) {
            window.location.href = 'index.html';
        }

        // Set default bulan = bulan ini
        var now = new Date();
        var defaultBulan = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
        document.getElementById('inputBulan').value = defaultBulan;

        var _data = null; // data laporan terakhir

        function geserBulan(delta) {
            var val = document.getElementById('inputBulan').value;
            if (!val) return;
            var d = new Date(val + '-01');
            d.setMonth(d.getMonth() + delta);
            var newVal = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
            document.getElementById('inputBulan').value = newVal;
            loadLaporan();
        }

        function getNamaBulan(bulanStr) {
            var nama = ['Januari','Februari','Maret','April','Mei','Juni',
                        'Juli','Agustus','September','Oktober','November','Desember'];
            var parts = bulanStr.split('-');
            return nama[parseInt(parts[1])-1] + ' ' + parts[0];
        }

        function fmtTgl(dt) {
            if (!dt) return '-';
            return new Date(dt).toLocaleDateString('id-ID', {day:'2-digit',month:'short',year:'numeric'});
        }

        function badgeKondisi(k) {
            if (!k) return '-';
            if (k === 'Baik') return '<span class="bdg bdg-hijau">'+k+'</span>';
            if (k === 'Rusak Ringan') return '<span class="bdg bdg-kuning">'+k+'</span>';
            return '<span class="bdg bdg-merah">'+k+'</span>';
        }

        function badgeStatus(s) {
            if (!s) return '-';
            var cls = 'bdg-abu';
            if (s === 'Tersedia') cls = 'bdg-hijau';
            else if (s.includes('Digunakan')) cls = 'bdg-biru';
            else if (s === 'Servis') cls = 'bdg-kuning';
            else if (s === 'Rusak' || s === 'Hilang') cls = 'bdg-merah';
            return '<span class="bdg '+cls+'">'+s+'</span>';
        }

        function emptyHTML(msg) {
            return '<div class="empty-lap"><i class="fas fa-check-circle"></i>'+msg+'</div>';
        }

        async function loadLaporan() {
            var bulan = document.getElementById('inputBulan').value;
            if (!bulan) return alert('Pilih periode bulan terlebih dahulu.');

            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('btnPDF').classList.remove('show');

            try {
                var BASE = (typeof API_URL !== 'undefined') ? API_URL.replace(/\/api$/,'') : 'http://localhost:3000';
                var resp = await fetch(BASE + '/api/laporan-bulanan?bulan=' + bulan);
                var json = await resp.json();
                if (!json.success) throw new Error(json.message);

                _data = json.data;
                renderLaporan(_data, bulan);

            } catch(e) {
                document.getElementById('loadingState').style.display = 'none';
                alert('Gagal memuat laporan: ' + e.message);
            }
        }

        function renderLaporan(d, bulan) {
            var r = d.ringkasan || {};

            // ── RINGKASAN CARDS ──
            var asetBaru = (d.laptop_baru||[]).length + (d.kendaraan_baru||[]).length +
                           (d.printer_baru||[]).length + (d.hp_baru||[]).length;
            var masalah  = (d.laptop_bermasalah||[]).length + (d.kendaraan_bermasalah||[]).length +
                           (d.printer_bermasalah||[]).length + (d.hp_bermasalah||[]).length;
            var assign   = (d.laptop_assign_bulan_ini||[]).length;
            var karyBaru = (d.karyawan_baru||[]).length;

            document.getElementById('ringkasanGrid').innerHTML = [
                { label:'Total Karyawan',  num: r.total_karyawan||0,   cls:'biru',   sub:'per akhir '+getNamaBulan(bulan) },
                { label:'Total Aset',      num: (parseInt(r.total_laptop)||0)+(parseInt(r.total_kendaraan)||0)+(parseInt(r.total_printer)||0)+(parseInt(r.total_hp)||0)+(parseInt(r.total_drone)||0), cls:'biru', sub:'laptop+kendaraan+printer+HP+drone' },
                { label:'Aset Baru Masuk', num: asetBaru,  cls:'hijau',  sub:'ditambahkan bulan ini' },
                { label:'Aset Bermasalah', num: masalah,   cls:'merah',  sub:'rusak/servis/hilang' },
                { label:'Karyawan Baru',   num: karyBaru,  cls:'hijau',  sub:'bergabung bulan ini' },
                { label:'Penugasan Laptop',num: assign,    cls:'kuning', sub:'pergantian pengguna' },
            ].map(function(c){
                return '<div class="rcard '+c.cls+'">'+
                    '<div class="rc-label">'+c.label+'</div>'+
                    '<div class="rc-num">'+c.num+'</div>'+
                    '<div class="rc-sub">'+c.sub+'</div>'+
                    '</div>';
            }).join('');

            document.getElementById('cntAsetBaru').textContent = asetBaru;
            document.getElementById('cntMasalah').textContent  = masalah;
            document.getElementById('cntAssign').textContent   = assign;
            document.getElementById('cntKaryawan').textContent = karyBaru;

            // ── SECTION ASET BARU ──
            var htmlBaru = '';

            if ((d.laptop_baru||[]).length) {
                htmlBaru += subSection('Laptop', 'fas fa-laptop', [
                    'No. Inventaris','Merek / Model','Serial Number','Kondisi','Status','Tgl Masuk'
                ], (d.laptop_baru||[]).map(function(x){ return [
                    '<strong>'+x.nomor_inventaris+'</strong>',
                    x.merek+' '+(x.model||''),
                    x.serial_number||'-',
                    badgeKondisi(x.kondisi),
                    badgeStatus(x.status),
                    fmtTgl(x.created_at)
                ]; }));
            }
            if ((d.kendaraan_baru||[]).length) {
                htmlBaru += subSection('Kendaraan', 'fas fa-car', [
                    'No. Plat','Jenis','Merek / Model','Tahun','Kondisi','Status','Tgl Masuk'
                ], (d.kendaraan_baru||[]).map(function(x){ return [
                    '<strong>'+x.nomor_plat+'</strong>',
                    x.jenis||'-',
                    x.merek+' '+(x.model||''),
                    x.tahun||'-',
                    badgeKondisi(x.kondisi),
                    badgeStatus(x.status),
                    fmtTgl(x.created_at)
                ]; }));
            }
            if ((d.printer_baru||[]).length) {
                htmlBaru += subSection('Printer', 'fas fa-print', [
                    'No. Inventaris','Merek / Model','Tipe','Kondisi','Status','Tgl Masuk'
                ], (d.printer_baru||[]).map(function(x){ return [
                    '<strong>'+x.nomor_inventaris+'</strong>',
                    x.merek+' '+(x.model||''),
                    x.tipe||'-',
                    badgeKondisi(x.kondisi),
                    badgeStatus(x.status),
                    fmtTgl(x.created_at)
                ]; }));
            }
            if ((d.hp_baru||[]).length) {
                htmlBaru += subSection('Handphone', 'fas fa-mobile-alt', [
                    'No. Inventaris','Merek / Model','Warna','Kondisi','Status','Tgl Masuk'
                ], (d.hp_baru||[]).map(function(x){ return [
                    '<strong>'+x.nomor_inventaris+'</strong>',
                    x.merek+' '+(x.model||''),
                    x.warna||'-',
                    badgeKondisi(x.kondisi),
                    badgeStatus(x.status),
                    fmtTgl(x.created_at)
                ]; }));
            }
            if (!htmlBaru) htmlBaru = emptyHTML('Tidak ada aset baru yang masuk bulan ini');
            document.getElementById('secAsetBaru').innerHTML = htmlBaru;

            // ── SECTION ASET BERMASALAH ──
            var htmlMasalah = '';
            if ((d.laptop_bermasalah||[]).length) {
                htmlMasalah += subSection('Laptop Bermasalah', 'fas fa-laptop', [
                    'No. Inventaris','Merek / Model','Kondisi','Status','Pengguna Terakhir'
                ], (d.laptop_bermasalah||[]).map(function(x){ return [
                    '<strong>'+x.nomor_inventaris+'</strong>',
                    x.merek+' '+(x.model||''),
                    badgeKondisi(x.kondisi),
                    badgeStatus(x.status),
                    x.karyawan_nama||'-'
                ]; }));
            }
            if ((d.kendaraan_bermasalah||[]).length) {
                htmlMasalah += subSection('Kendaraan Bermasalah', 'fas fa-car', [
                    'No. Plat','Jenis','Merek / Model','Kondisi','Status'
                ], (d.kendaraan_bermasalah||[]).map(function(x){ return [
                    '<strong>'+x.nomor_plat+'</strong>',
                    x.jenis||'-',
                    x.merek+' '+(x.model||''),
                    badgeKondisi(x.kondisi),
                    badgeStatus(x.status)
                ]; }));
            }
            if ((d.printer_bermasalah||[]).length) {
                htmlMasalah += subSection('Printer Bermasalah', 'fas fa-print', [
                    'No. Inventaris','Merek / Model','Kondisi','Status'
                ], (d.printer_bermasalah||[]).map(function(x){ return [
                    '<strong>'+x.nomor_inventaris+'</strong>',
                    x.merek+' '+(x.model||''),
                    badgeKondisi(x.kondisi),
                    badgeStatus(x.status)
                ]; }));
            }
            if ((d.hp_bermasalah||[]).length) {
                htmlMasalah += subSection('Handphone Bermasalah', 'fas fa-mobile-alt', [
                    'No. Inventaris','Merek / Model','Kondisi','Status'
                ], (d.hp_bermasalah||[]).map(function(x){ return [
                    '<strong>'+x.nomor_inventaris+'</strong>',
                    x.merek+' '+(x.model||''),
                    badgeKondisi(x.kondisi),
                    badgeStatus(x.status)
                ]; }));
            }
            if (!htmlMasalah) htmlMasalah = emptyHTML('Semua aset dalam kondisi baik — tidak ada yang bermasalah');
            document.getElementById('secMasalah').innerHTML = htmlMasalah;

            // ── SECTION ASSIGN LAPTOP ──
            var assignArr = d.laptop_assign_bulan_ini || [];
            var htmlAssign = assignArr.length
                ? subSection('Laptop Ditugaskan', 'fas fa-exchange-alt', [
                    'No. Inventaris','Merek / Model','Ditugaskan Ke','ID Karyawan','Tgl Penugasan'
                  ], assignArr.map(function(x){ return [
                    '<strong>'+x.nomor_inventaris+'</strong>',
                    x.merek+' '+(x.model||''),
                    x.karyawan_nama||'-',
                    '<span style="font-size:11px;color:var(--biru-muda);">'+x.karyawan_id+'</span>',
                    fmtTgl(x.updated_at)
                  ]; }))
                : emptyHTML('Tidak ada pergantian/penugasan laptop bulan ini');
            document.getElementById('secAssign').innerHTML = htmlAssign;

            // ── SECTION KARYAWAN BARU ──
            var karyArr = d.karyawan_baru || [];
            var htmlKary = karyArr.length
                ? subSection('Karyawan Baru', 'fas fa-user', [
                    'ID','Nama','Jabatan','Divisi','Tgl Bergabung'
                  ], karyArr.map(function(x){ return [
                    '<span style="font-size:11px;color:var(--biru-muda);">'+x.id+'</span>',
                    '<strong>'+x.nama+'</strong>',
                    x.jabatan||'-',
                    x.divisi||'-',
                    fmtTgl(x.created_at)
                  ]; }))
                : emptyHTML('Tidak ada karyawan baru bulan ini');
            document.getElementById('secKaryawan').innerHTML = htmlKary;

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('btnPDF').classList.add('show');
        }

        function subSection(judul, icon, headers, rows) {
            var th = headers.map(function(h){ return '<th>'+h+'</th>'; }).join('');
            var tbody = rows.length
                ? rows.map(function(r){
                    return '<tr>'+r.map(function(c){ return '<td>'+c+'</td>'; }).join('')+'</tr>';
                  }).join('')
                : '<tr><td colspan="'+headers.length+'" class="empty-lap">Tidak ada data</td></tr>';
            return '<div style="margin-bottom:18px;">' +
                '<div style="font-size:12px;font-weight:700;color:var(--biru-muda);margin-bottom:8px;display:flex;align-items:center;gap:6px;">'+
                '<i class="'+icon+'"></i> '+judul+'</div>'+
                '<table class="lap-table"><thead><tr>'+th+'</tr></thead><tbody>'+tbody+'</tbody></table>'+
                '</div>';
        }

        // ── EXPORT PDF ──
        function exportPDF() {
            if (!_data) return alert('Muat laporan terlebih dahulu.');

            var bulan = document.getElementById('inputBulan').value;
            var namaBulan = getNamaBulan(bulan);
            var catatan = document.getElementById('catatanLaporan').value.trim();
            var r = _data.ringkasan || {};

            var doc = new window.jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
            var pageW = doc.internal.pageSize.getWidth();
            var margin = 15;
            var y = margin;

            // ── Header ──
            doc.setFillColor(26, 77, 140);
            doc.rect(0, 0, pageW, 38, 'F');
            doc.setTextColor(255,255,255);
            doc.setFontSize(16); doc.setFont(undefined,'bold');
            doc.text('PT WIRATAMA GLOBALINDO JAYA', pageW/2, 13, {align:'center'});
            doc.setFontSize(11); doc.setFont(undefined,'normal');
            doc.text('LAPORAN BULANAN INVENTARIS — '+namaBulan.toUpperCase(), pageW/2, 21, {align:'center'});
            doc.setFontSize(9);
            doc.text('Dicetak: '+new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}), pageW/2, 29, {align:'center'});

            doc.setTextColor(0,0,0);
            y = 48;

            // ── Ringkasan ──
            doc.setFontSize(11); doc.setFont(undefined,'bold');
            doc.setTextColor(26,77,140);
            doc.text('RINGKASAN PERIODE', margin, y); y += 6;
            doc.setTextColor(0,0,0);

            var totalAset = (parseInt(r.total_laptop)||0)+(parseInt(r.total_kendaraan)||0)+
                            (parseInt(r.total_printer)||0)+(parseInt(r.total_hp)||0);
            var masalahTot = (parseInt(r.laptop_masalah)||0)+(parseInt(r.kendaraan_masalah)||0)+
                             (parseInt(r.printer_masalah)||0)+(parseInt(r.hp_masalah)||0);
            var asetBaru = (_data.laptop_baru||[]).length+(_data.kendaraan_baru||[]).length+
                           (_data.printer_baru||[]).length+(_data.hp_baru||[]).length;

            doc.autoTable({
                startY: y,
                head: [['Keterangan','Jumlah']],
                body: [
                    ['Total Karyawan', r.total_karyawan||0],
                    ['Total Aset (Laptop+Kendaraan+Printer+HP)', totalAset],
                    ['Aset Baru Masuk Bulan Ini', asetBaru],
                    ['Aset Bermasalah (Rusak/Servis/Hilang)', masalahTot],
                    ['Karyawan Baru', (_data.karyawan_baru||[]).length],
                    ['Penugasan/Pergantian Laptop', (_data.laptop_assign_bulan_ini||[]).length],
                ],
                styles: { fontSize: 10, cellPadding: 4 },
                headStyles: { fillColor: [26,77,140], textColor: 255, fontStyle:'bold' },
                alternateRowStyles: { fillColor: [240,245,255] },
                columnStyles: { 1: { halign:'center', fontStyle:'bold' } },
                margin: { left: margin, right: margin }
            });
            y = doc.lastAutoTable.finalY + 10;

            // ── Helper: buat section tabel PDF ──
            function pdfSection(judul, headers, rows) {
                if (!rows || !rows.length) return;
                if (y > 240) { doc.addPage(); y = margin; }
                doc.setFontSize(11); doc.setFont(undefined,'bold'); doc.setTextColor(26,77,140);
                doc.text(judul, margin, y); y += 5;
                doc.setTextColor(0,0,0);
                doc.autoTable({
                    startY: y,
                    head: [headers],
                    body: rows,
                    styles: { fontSize: 9, cellPadding: 3, overflow:'ellipsize' },
                    headStyles: { fillColor: [26,77,140], textColor:255, fontStyle:'bold', fontSize:9 },
                    alternateRowStyles: { fillColor: [248,250,255] },
                    margin: { left: margin, right: margin },
                    didDrawPage: function(data) {
                        // footer tiap halaman
                        doc.setFontSize(8); doc.setTextColor(150,150,150);
                        doc.text('PT Wiratama Globalindo Jaya — Laporan Bulanan Inventaris '+namaBulan,
                            margin, doc.internal.pageSize.getHeight()-8);
                        doc.text('Hal. '+doc.internal.getNumberOfPages(),
                            pageW-margin, doc.internal.pageSize.getHeight()-8, {align:'right'});
                    }
                });
                y = doc.lastAutoTable.finalY + 10;
            }

            // Aset Baru
            if ((_data.laptop_baru||[]).length)
                pdfSection('LAPTOP BARU MASUK',
                    ['No. Inventaris','Merek','Model','S/N','Kondisi','Status','Tgl Masuk'],
                    (_data.laptop_baru||[]).map(function(x){ return [
                        x.nomor_inventaris, x.merek, x.model||'-', x.serial_number||'-',
                        x.kondisi, x.status, fmtTgl(x.created_at)]; }));

            if ((_data.kendaraan_baru||[]).length)
                pdfSection('KENDARAAN BARU MASUK',
                    ['No. Plat','Jenis','Merek','Model','Tahun','Kondisi','Status'],
                    (_data.kendaraan_baru||[]).map(function(x){ return [
                        x.nomor_plat, x.jenis||'-', x.merek, x.model||'-',
                        x.tahun||'-', x.kondisi, x.status]; }));

            if ((_data.printer_baru||[]).length)
                pdfSection('PRINTER BARU MASUK',
                    ['No. Inventaris','Merek','Model','Tipe','Kondisi','Status'],
                    (_data.printer_baru||[]).map(function(x){ return [
                        x.nomor_inventaris, x.merek, x.model||'-',
                        x.tipe||'-', x.kondisi, x.status]; }));

            if ((_data.hp_baru||[]).length)
                pdfSection('HANDPHONE BARU MASUK',
                    ['No. Inventaris','Merek','Model','Warna','Kondisi','Status'],
                    (_data.hp_baru||[]).map(function(x){ return [
                        x.nomor_inventaris, x.merek, x.model||'-',
                        x.warna||'-', x.kondisi, x.status]; }));

            // Bermasalah
            if ((_data.laptop_bermasalah||[]).length)
                pdfSection('LAPTOP BERMASALAH',
                    ['No. Inventaris','Merek','Model','Kondisi','Status','Pengguna'],
                    (_data.laptop_bermasalah||[]).map(function(x){ return [
                        x.nomor_inventaris, x.merek, x.model||'-',
                        x.kondisi, x.status, x.karyawan_nama||'-']; }));

            if ((_data.kendaraan_bermasalah||[]).length)
                pdfSection('KENDARAAN BERMASALAH',
                    ['No. Plat','Jenis','Merek','Model','Kondisi','Status'],
                    (_data.kendaraan_bermasalah||[]).map(function(x){ return [
                        x.nomor_plat, x.jenis||'-', x.merek, x.model||'-',
                        x.kondisi, x.status]; }));

            if ((_data.printer_bermasalah||[]).length)
                pdfSection('PRINTER BERMASALAH',
                    ['No. Inventaris','Merek','Model','Kondisi','Status'],
                    (_data.printer_bermasalah||[]).map(function(x){ return [
                        x.nomor_inventaris, x.merek, x.model||'-',
                        x.kondisi, x.status]; }));

            if ((_data.hp_bermasalah||[]).length)
                pdfSection('HANDPHONE BERMASALAH',
                    ['No. Inventaris','Merek','Model','Kondisi','Status'],
                    (_data.hp_bermasalah||[]).map(function(x){ return [
                        x.nomor_inventaris, x.merek, x.model||'-',
                        x.kondisi, x.status]; }));

            // Assign
            if ((_data.laptop_assign_bulan_ini||[]).length)
                pdfSection('PENUGASAN LAPTOP BULAN INI',
                    ['No. Inventaris','Merek','Model','Ditugaskan Ke','ID Karyawan','Tgl Penugasan'],
                    (_data.laptop_assign_bulan_ini||[]).map(function(x){ return [
                        x.nomor_inventaris, x.merek, x.model||'-',
                        x.karyawan_nama, x.karyawan_id, fmtTgl(x.updated_at)]; }));

            // Karyawan baru
            if ((_data.karyawan_baru||[]).length)
                pdfSection('KARYAWAN BARU BULAN INI',
                    ['ID','Nama','Jabatan','Divisi','Tgl Bergabung'],
                    (_data.karyawan_baru||[]).map(function(x){ return [
                        x.id, x.nama, x.jabatan||'-', x.divisi||'-', fmtTgl(x.created_at)]; }));

            // Catatan
            if (catatan) {
                if (y > 240) { doc.addPage(); y = margin; }
                doc.setFontSize(11); doc.setFont(undefined,'bold'); doc.setTextColor(26,77,140);
                doc.text('CATATAN LAPORAN', margin, y); y += 6;
                doc.setFontSize(10); doc.setFont(undefined,'normal'); doc.setTextColor(60,60,60);
                var lines = doc.splitTextToSize(catatan, pageW - margin*2);
                doc.text(lines, margin, y);
                y += lines.length * 5 + 8;
            }

            // Tanda tangan
            if (y > 230) { doc.addPage(); y = margin; }
            y += 10;
            doc.setFontSize(10); doc.setTextColor(0,0,0);
            var xL = margin + 10, xR = pageW - margin - 50;
            doc.text('Dibuat oleh,', xL, y);
            doc.text('Mengetahui,', xR, y);
            y += 28;
            doc.line(xL, y, xL+50, y);
            doc.line(xR, y, xR+50, y);
            y += 5;
            doc.setFontSize(9);
            doc.text('Staff IT / Admin Inventaris', xL, y);
            doc.text('Kepala Divisi / Manajemen', xR, y);

            // Footer tiap halaman (sudah di didDrawPage, ini untuk halaman terakhir jika tidak re-trigger)
            var totalPages = doc.internal.getNumberOfPages();
            for (var i = 1; i <= totalPages; i++) {
                doc.setPage(i);
                doc.setFontSize(8); doc.setTextColor(150,150,150);
                doc.text('PT Wiratama Globalindo Jaya — Laporan Bulanan Inventaris '+namaBulan,
                    margin, doc.internal.pageSize.getHeight()-8);
                doc.text('Hal. '+i+' / '+totalPages,
                    pageW-margin, doc.internal.pageSize.getHeight()-8, {align:'right'});
            }

            // Nama file
            var tglFile = new Date().toLocaleDateString('id-ID').replace(/[/]/g,'-');
            doc.save('Laporan_Bulanan_'+bulan+'_PT_Wiratama_'+tglFile+'.pdf');
        }
    </script>
</body>
</html>
