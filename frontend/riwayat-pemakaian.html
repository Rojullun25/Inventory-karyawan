<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pemakaian - Inventory Karyawan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .container h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15);
        }
        .filters-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filter-group {
            flex: 1;
            min-width: 180px;
        }
        .filter-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
        }
        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #1A4D8C;
        }
        .btn-refresh-filter {
            padding: 10px 18px;
            background: #1A4D8C;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-refresh-filter:hover { background: #2B6EB0; }
        .riwayat-table-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .riwayat-table-card table {
            width: 100%;
            border-collapse: collapse;
        }
        .riwayat-table-card th {
            background: #f8fafc;
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }
        .riwayat-table-card td {
            padding: 14px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            color: #334155;
        }
        .riwayat-table-card tr:hover { background: #f8fafc; }
        .riwayat-table-card tr:last-child td { border-bottom: none; }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-aktif   { background: #dcfce7; color: #15803d; }
        .badge-selesai { background: #f1f5f9; color: #64748b; }
        .badge-tipe    { background: #dbeafe; color: #1e40af; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #cbd5e1;
            display: block;
        }
        .meta-small {
            font-size: 12px;
            color: #94a3b8;
        }
        .table-wrapper {
            overflow-x: auto;
        }
    </style>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A4D8C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PT Wiratama">
    <link rel="apple-touch-icon" href="img/pwa/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/pwa/icon-192.png">
</head>
<body>
    
    

    <div class="container">
        <h2><i class="fas fa-history"></i> Riwayat Pemakaian Barang</h2>

        <div class="filters-card">
            <div class="filter-group">
                <label>Tipe Barang</label>
                <select id="filterTipe">
                    <option value="">Semua Tipe</option>
                    <option value="laptop">Laptop</option>
                    <option value="handphone">Handphone</option>
                    <option value="kendaraan">Kendaraan</option>
                    <option value="printer">Printer</option>
                    <option value="drone">Drone</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Status</label>
                <select id="filterStatus">
                    <option value="">Semua Status</option>
                    <option value="true">Sedang Dipakai</option>
                    <option value="false">Sudah Dikembalikan</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Cari Nama Karyawan/Barang</label>
                <input type="text" id="filterSearch" placeholder="Ketik untuk mencari...">
            </div>
            <button class="btn-refresh-filter" onclick="loadRiwayat()">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>

        <div class="riwayat-table-card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Tipe</th>
                            <th>Barang</th>
                            <th>Karyawan</th>
                            <th>Tanggal Assign</th>
                            <th>Tanggal Return</th>
                            <th>Status</th>
                            <th>Di-assign Oleh</th>
                            <th>Catatan</th>
                        </tr>
                    </thead>
                    <tbody id="riwayatBody">
                        <tr><td colspan="8" class="empty-state"><i class="fas fa-spinner fa-spin"></i>Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="script.js"></script>
    <script src="layout.js"></script>
    <script src="pwa-register.js"></script>
    <script>
        if (!localStorage.getItem('auth_token')) {
            window.location.href = 'index.html';
        }

        let allRiwayat = [];

        async function loadRiwayat() {
            const tipe = document.getElementById('filterTipe').value;
            const aktif = document.getElementById('filterStatus').value;

            const tbody = document.getElementById('riwayatBody');
            tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="fas fa-spinner fa-spin"></i>Memuat data...</td></tr>';

            const filter = {};
            if (tipe) filter.tipe = tipe;
            if (aktif) filter.aktif = aktif;

            allRiwayat = await getAllRiwayat(filter);
            renderRiwayat();
        }

        function renderRiwayat() {
            const search = document.getElementById('filterSearch').value.toLowerCase();
            const tbody = document.getElementById('riwayatBody');

            let filtered = allRiwayat;
            if (search) {
                filtered = allRiwayat.filter(r =>
                    (r.nama_karyawan || '').toLowerCase().includes(search) ||
                    (r.nama_barang || '').toLowerCase().includes(search) ||
                    (r.karyawan_id || '').toLowerCase().includes(search)
                );
            }

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="fas fa-inbox"></i>Belum ada data riwayat</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(r => {
                const tglAssign = new Date(r.tanggal_assign).toLocaleString('id-ID', {
                    day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                const tglReturn = r.tanggal_return
                    ? new Date(r.tanggal_return).toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
                    : '-';
                const statusBadge = r.tanggal_return
                    ? '<span class="badge badge-selesai">Sudah Dikembalikan</span>'
                    : '<span class="badge badge-aktif">Sedang Dipakai</span>';

                return `
                    <tr>
                        <td><span class="badge badge-tipe">${r.tipe_barang}</span></td>
                        <td><strong>${r.nama_barang || '-'}</strong></td>
                        <td>${r.nama_karyawan || '-'}<br><span class="meta-small">${r.karyawan_id || ''}</span></td>
                        <td>${tglAssign}</td>
                        <td>${tglReturn}</td>
                        <td>${statusBadge}</td>
                        <td><span class="meta-small">${r.assigned_by_username || '-'}</span></td>
                        <td style="max-width:200px;font-size:12px;color:#64748b;">${r.catatan_assign || '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('filterTipe').addEventListener('change', loadRiwayat);
        document.getElementById('filterStatus').addEventListener('change', loadRiwayat);
        document.getElementById('filterSearch').addEventListener('input', renderRiwayat);

        loadRiwayat();
    </script>
</body>
</html>
